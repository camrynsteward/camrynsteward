<style>

body {
    background-color: #fff4e6; /* light orange */
    font-family: Georgia, serif;
    margin: 0;
}

/* BANNER */
.banner {
    background-color: teal;
    color: white;
    text-align: center;
    padding: 20px;
}

/* NAV */
.nav {
    background: #66cccc;
    text-align: center;
    border: 2px solid black;
    padding: 10px;
}

.nav a {
    margin: 20px;
    text-decoration: underline;
    font-weight: bold;
    color: black;
}

/* OUTER WHITE BOX */
.wrapper {
    width: 70%;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 0 10px gray;
}

/* INNER TEAL BOX */
.inner-box {
    background: teal;
    color: white;
    padding: 20px;
    border-radius: 15px;
}

/* SPLIT LAYOUT */
.flex {
    display: flex;
    gap: 20px;
    margin-top: 15px;
}

.left {
    flex: 1;
}

.right {
    flex: 1;
}

/* MAP */
iframe {
    width: 100%;
    height: 250px;
    border: none;
    border-radius: 10px;
}

/* LINKS */
.link-btn {
    display: inline-block;
    margin-top: 15px;
    background: white;
    color: teal;
    padding: 6px 12px;
    text-decoration: none;
    font-weight: bold;
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 30px;
}

footer a {
    color: teal;
    text-decoration: none;
}
