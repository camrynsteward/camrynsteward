<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>

body {
    background-color: #fff4e6;
    font-family: Georgia, serif;
    margin: 0;
}

/* TOP BANNER */
.banner {
    background-color: teal;
    color: white;
    text-align: center;
    padding: 50px;
    font-size: 36px;
    font-weight: bold;
}

/* NAV BAR */
.nav {
    background: #66cccc;
    text-align: center;
    border: 2px solid black;
    padding: 20px;
}

.nav a {
    margin: 25px;
    font-size: 18px;
    text-decoration: underline;
    font-weight: bold;
    color: black;
}

/* MAIN WHITE BOX (BIG + CENTERED) */
.wrapper {
    width: 95%;
    max-width: 1600px;
    margin: 50px auto;
    background: white;
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 0 15px gray;
}

/* INNER TEAL BOX */
.inner-box {
    background: teal;
    color: white;
    padding: 30px;
    border-radius: 15px;
}

.flex {
    display: flex;
    gap: 50px;        /* more breathing room */
    align-items: stretch;
}


.left {
    flex: 1;
    font-size: 20px;   /* bigger text */
}

/* RIGHT MAP */
.right {
    flex: 1;
}

iframe {
    width: 100%;
    height: 450px;     /* MUCH larger map */
}

/* BUTTON STYLE */
.btn {
    display: inline-block;
    margin-top: 20px;
    background: white;
    color: teal;
    padding: 8px 15px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
}

/* FOOTER */
footer {
    text-align: center;
    margin-top: 30px;
    font-size: 16px;
}

footer a {
    color: teal;
    text-decoration: none;
}

</style>
</head>
