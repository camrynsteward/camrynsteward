<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>

body {
    background-color: #f5e6d3; /* ✅ LIGHTER ORANGE */
    font-family: Georgia, serif;
    margin: 0;
}

/* HEADER */
.banner {
    background-color: teal;
    color: white;
    text-align: center;
    padding: 120px;
    font-size: 70px; /* ✅ BIG */
    font-weight: bold;
}

/* NAV */
.nav {
    background: #66cccc;
    text-align: center;
    padding: 30px;
    border-bottom: 3px solid black;
}

.nav a {
    margin: 20px;
    font-weight: bold;
    color: black;
    font-size: 26px; /* ✅ BIGGER */
    text-decoration: none;
}

/* MAIN BOX */
.wrapper {
    width: 95%;              /* ✅ MUCH WIDER */
    max-width: 1400px;
    margin: 80px auto;
    background: white;
    padding: 60px;           /* ✅ MORE SPACE */
    border-radius: 15px;
    box-shadow: 0 0 15px gray;
}

/* INNER BOX */
.inner-box {
    background: teal;
    color: white;
    padding: 50px; /* ✅ bigger */
    border-radius: 12px;
}

/* FLEX */
.flex {
    display: flex;
    gap: 60px; /* ✅ MORE SPACE BETWEEN */
    align-items: stretch;
}

/* LEFT */
.left {
    flex: 1;
    background: #f5e6d3;
    color: black;
    padding: 35px;
    border-radius: 12px;
    font-size: 22px;   /* ✅ MUCH BIGGER TEXT */
    line-height: 2;
}

/* RIGHT MAP */
.right {
    flex: 1;
}

/* MAP */
iframe {
    width: 100%;
    height: 500px;  /* ✅ HUGE LIKE EXAMPLE */
    border-radius: 12px;
}

/* BUTTON */
.btn {
    display: inline-block;
    background: maroon;
    color: white;
    padding: 15px 25px;
    margin-top: 25px;
    text-decoration: none;
    font-weight: bold;
    border-radius: 8px;
    font-size: 18px;
}

/* FOOTER */
footer {
    text-align: center;
    margin: 40px;
    font-size: 20px; /* ✅ bigger */
}

footer a {
    color: maroon;
    text-decoration: none;
    font-weight: bold;
}

</style>

</head>

<div class="banner">
    CONTACT INFORMATION
</div>

    <a href="ecommerce.html">Home</a>

    <a href="contact.html">Contact</a>
</div>

<div class="wrapper">

<div class="inner-box">

</html>
